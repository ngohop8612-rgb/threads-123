<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0f2f5; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 40px;
            max-width: 380px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; margin-bottom: 24px; text-align: center; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 15px; margin-bottom: 12px; }
    button { width: 100%; padding: 13px; background: #000; color: white;
             border: none; border-radius: 8px; font-size: 15px;
             font-weight: 600; cursor: pointer; }
    .error { color: red; font-size: 13px; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Admin Panel</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Nhập mật khẩu admin" required>
      <button type="submit">Đăng nhập</button>
    </form>
  </div>
</body>
</html>
