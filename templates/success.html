<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết nối thành công!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0f2f5; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 40px;
            max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; }
    .username { color: #0866ff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Kết nối thành công!</h1>
    <p>Tài khoản <span class="username">@{{ username }}</span> của bạn đã được kết nối.<br><br>
       Chúng tôi sẽ bắt đầu đăng bài theo lịch cho bạn. Cảm ơn <strong>{{ customer_name }}</strong>!</p>
  </div>
</body>
</html>
