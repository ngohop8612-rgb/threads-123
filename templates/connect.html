<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết nối Threads</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0f2f5; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 40px;
            max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .name { color: #0866ff; font-weight: 600; }
    .btn { display: block; background: #000; color: white;
           padding: 14px 24px; border-radius: 10px; text-decoration: none;
           font-size: 16px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .note { margin-top: 20px; font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧵</div>
    <h1>Kết nối tài khoản Threads</h1>
    <p>Xin chào <span class="name">{{ customer_name }}</span>!<br>
       Nhấn nút bên dưới để cho phép chúng tôi đăng bài giúp bạn trên Threads.</p>
    <a href="{{ auth_url }}" class="btn">🔗 Kết nối Threads ngay</a>
    <p class="note">Bạn sẽ được chuyển đến trang đăng nhập Meta chính thức.<br>Thông tin của bạn hoàn toàn an toàn.</p>
  </div>
</body>
</html>
